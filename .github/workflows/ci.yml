name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Download sccache
        shell: bash
        run: |
          SCCACHE_VERSION=0.8.0
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          mkdir -p $CARGO_HOME/bin/
          mv sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache $CARGO_HOME/bin/
          chmod +x $CARGO_HOME/bin/sccache

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-lint
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Start sccache server
        shell: bash
        run: $CARGO_HOME/bin/sccache --start-server

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy
        shell: bash
        run: RUSTC_WRAPPER=$CARGO_HOME/bin/sccache cargo clippy -- -D warnings

      - name: Formatting check
        run: cargo fmt -- --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Download sccache
        shell: bash
        run: |
          SCCACHE_VERSION=0.8.0
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          mkdir -p $CARGO_HOME/bin/
          mv sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache $CARGO_HOME/bin/
          chmod +x $CARGO_HOME/bin/sccache

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-security
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Start sccache server
        shell: bash
        run: $CARGO_HOME/bin/sccache --start-server

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: security-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            security-cargo-

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        env:
          ADVISORY_DB_CACHE_DIR: /tmp/advisory-db

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Download sccache
        shell: bash
        run: |
          SCCACHE_VERSION=0.8.0
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          mkdir -p $CARGO_HOME/bin/
          mv sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache $CARGO_HOME/bin/
          chmod +x $CARGO_HOME/bin/sccache

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-docs
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Start sccache server
        shell: bash
        run: $CARGO_HOME/bin/sccache --start-server

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: docs-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            docs-cargo-

      - name: Build documentation
        run: cargo doc --no-deps --document-private-items

      - name: Check for warnings
        run: RUSTDOCFLAGS="-A warnings" cargo doc --no-deps --document-private-items

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Download sccache
        shell: bash
        run: |
          SCCACHE_VERSION=0.8.0
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          mkdir -p $CARGO_HOME/bin/
          mv sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache $CARGO_HOME/bin/
          chmod +x $CARGO_HOME/bin/sccache

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-coverage
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Start sccache server
        shell: bash
        run: $CARGO_HOME/bin/sccache --start-server

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: coverage-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-cargo-

      - name: Cache cargo-tarpaulin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: cargo-tarpaulin-bin

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Json --output-dir ./coverage --fail-under 60

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Reports available as artifact" >> $GITHUB_STEP_SUMMARY
          cat coverage/summary.json 2>/dev/null || echo "Coverage report generated"

  test:
    needs: [lint, security, docs]
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sccache-arch: x86_64-unknown-linux-musl

          - os: macos-latest
            target: aarch64-apple-darwin
            sccache-arch: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sccache-arch: x86_64-pc-windows-msvc

          # ARM64 Linux via cross-compilation (works on free GitHub plans)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            sccache-arch: x86_64-unknown-linux-musl
            use-cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download sccache
        shell: bash
        run: |
          SCCACHE_VERSION=0.8.0
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-${{ matrix.sccache-arch }}.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          mkdir -p $CARGO_HOME/bin/
          mv sccache-v${SCCACHE_VERSION}-${{ matrix.sccache-arch }}/sccache $CARGO_HOME/bin/
          chmod +x $CARGO_HOME/bin/sccache

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Start sccache server
        shell: bash
        run: $CARGO_HOME/bin/sccache --start-server

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --quiet

      - name: Build (cross)
        if: matrix.use-cross == true
        shell: bash
        run: cross build --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use-cross != true
        shell: bash
        run: RUSTC_WRAPPER=$CARGO_HOME/bin/sccache cargo build --target ${{ matrix.target }}

      - name: Run tests (cross)
        if: matrix.use-cross == true
        run: cross test --target ${{ matrix.target }}

      - name: Run tests (native)
        if: matrix.use-cross != true
        run: cargo test --target ${{ matrix.target }}

      - name: Test CLI
        if: matrix.use-cross != true
        run: |
          cargo run -- -- tests/fixtures/github/valid.yml
          cargo run -- tests/fixtures/github/circular.yml || true

  test-pr:
    needs: [lint, security, docs]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sccache-arch: x86_64-unknown-linux-musl

          - os: macos-latest
            target: aarch64-apple-darwin
            sccache-arch: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sccache-arch: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download sccache
        shell: bash
        run: |
          SCCACHE_VERSION=0.8.0
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-${{ matrix.sccache-arch }}.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          mkdir -p $CARGO_HOME/bin/
          mv sccache-v${SCCACHE_VERSION}-${{ matrix.sccache-arch }}/sccache $CARGO_HOME/bin/
          chmod +x $CARGO_HOME/bin/sccache

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Start sccache server
        shell: bash
        run: $CARGO_HOME/bin/sccache --start-server

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Build
        shell: bash
        run: RUSTC_WRAPPER=$CARGO_HOME/bin/sccache cargo build --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Test CLI
        run: |
          cargo run -- -- tests/fixtures/github/valid.yml
          cargo run -- tests/fixtures/github/circular.yml || true
