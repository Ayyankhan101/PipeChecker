name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: lint-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-cargo-

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Formatting check
        run: cargo fmt -- --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: security-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            security-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit --force

      - name: Run security audit
        run: cargo audit
        env:
          ADVISORY_DB_CACHE_DIR: /tmp/advisory-db

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: docs-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            docs-cargo-

      - name: Build documentation
        run: cargo doc --no-deps --document-private-items

      - name: Check for warnings
        run: |
          RUSTDOCFLAGS="-A warnings" cargo doc --no-deps --document-private-items

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: coverage-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-cargo-

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --force

      - name: Generate coverage report
        run: cargo tarpaulin --out Json --output-dir ./coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Reports available as artifact" >> $GITHUB_STEP_SUMMARY
          cat coverage/summary.json 2>/dev/null || echo "Coverage report generated"

  test:
    needs: [lint, security, docs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest-arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest-arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64-linux-gnu cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure aarch64-linux-gnu linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Build
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }}

      - name: Test CLI
        run: |
          cargo run -- -- tests/fixtures/github/valid.yml
          cargo run -- tests/fixtures/github/circular.yml || true

  test-msrv:
    needs: [lint, security, docs]
    runs-on: ubuntu-latest
    name: Test Rust 1.82
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.82
        run: |
          rustup install 1.82
          rustup default 1.82

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: msrv-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            msrv-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose